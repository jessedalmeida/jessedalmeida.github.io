- key: dalmeida_jendo_2025
  year: "2025"
  type: journal
  title: "Robotic Transurethral Vesicourethral Anastomosis after Radical Prostatectomy in Validated Models"
  authors: "**J. F. d'Almeida**, K. Maciolek, E. Wilke, J. Shrand, L. Shepard, T. E. Ertop, A. E. Ghazi, R. J. Webster III, S. D. Herrell III, N. L. Kavoussi"
  venue: "Journal of Endourology (JEndo)"
  doi: ""
  pdf: "assets/papers/2025_JEndo_Transurethral_Anastomosis.pdf"
  # Not yet indexed — add DOI when available
  featured: true
  featured_blurb: >
    Techniques that minimize dissection of neurovascular structures during radical prostatectomy
    improve perioperative outcomes and functional recovery. We sought to address this with a
    concentric tube robot (CTR) system designed specifically for performing a transurethral
    vesicourethral anastomosis after transurethral prostatectomy, in a series of validated phantoms.
  featured_media_type: image
  featured_media_url: "assets/images/dalmeida_jendo2025_figure.png"

